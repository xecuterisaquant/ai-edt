# Keyword tiers for AI-EDT Stage 1 + Stage 2 filter
#
# Architecture:
#   Stage 1 checks all three tiers before any LLM call.
#   1. no_pass  → deterministic BLOCK  (corporate governance, analyst commentary)
#   2. high_alpha → deterministic PASS  (VIP bypass, straight to Stage 3)
#   3. general  → Stage 2 LLM sieve    (ambiguous — let the 1B model decide)
#
# Evaluation order: no_pass checked FIRST so it can silence a general keyword match.
#
# To add a keyword: edit this file and restart the pipeline. No code changes needed.

no_pass:
  # Corporate governance — never a supply-chain event
  - ceo resigns
  - cfo resigns
  - coo resigns
  - board appoints
  - board elects
  - executive appoints
  - management changes
  - pay deal
  - pay rise
  - pay cut
  - workers vote
  - workers accept
  - union accepts
  - union rejects
  - union votes
  # Routine completed operations — never a signal-generating event
  - on schedule
  - as scheduled
  - delivery completes
  # Analyst commentary and market forecasts — not actionable events
  - analysts forecast
  - analysts expect
  - analysts predict
  - forecast stable
  - prices to remain
  - prices expected
  - outlook unchanged
  - market stable
  - supply balanced
  # Corporate financial calendar — routine disclosures, never supply-chain events
  - quarterly dividend
  - within expectations
  - annual dividend
  - quarterly earnings
  - reports earnings
  - reports revenue
  - quarterly results
  # Non-event corporate communications
  - sustainability report
  - annual report
  - investor day
  - investor presentation

high_alpha:
  # Geopolitical supply chokepoints
  - venezuela
  - sanction
  - hormuz
  - suez
  - heavy crude
  - heavy sour
  - iran
  - houthi
  - red sea
  - opec
  - malacca
  - yemen
  - libya
  - cape of good hope
  - panama canal
  - caspian
  - ras tanura
  - fujairah        # Major UAE oil storage/export hub
  - wti             # WTI-Brent spread events always refinery-relevant
  - keystone        # Major Canadian crude pipeline; rupture/shutdown always significant
  # Supply disruptions — always trade-relevant, no LLM judgment needed
  - explosion
  - exploded
  - fire at
  - refinery fire
  - outage
  - unplanned shutdown
  - force majeure
  - blast
  - pipeline rupture
  - pipeline leak
  - drone strike
  - loading suspended
  # Crude pricing mechanisms — direct margin impact on refiners
  - official selling price
  - osp
  - strategic petroleum reserve
  - petroleum reserve
  # Shipping rate events — explicit market data always worth analysing
  - vlcc
  - aframax
  - suezmax
  - day rate
  - freight rate
  - spot rate
  - tanker rate
  - shipping rate

general:
  - oil
  - tanker
  - refinery
  - bpd
  - fleet
  - vessel
  - brent       # Crude benchmark; sieve filters out price opinions
  - cushing     # Cushing, Oklahoma storage hub
  - ngl         # Natural gas liquids — midstream/fractionation events
  - lpg         # Liquefied petroleum gas — PSX/fractionation relevant
  - pipeline    # General pipeline events (not Keystone-specific)
